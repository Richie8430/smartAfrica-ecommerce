<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO + trust -->
    <meta name="description" content="SmartTrade Africa — secure, fast e-commerce for Africa. Shop electronics, gadgets, and more with biometric checkout and Flutterwave payments." />
    <meta name="keywords" content="SmartTrade, e-commerce, Africa, online shopping, electronics, secure payments" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="SmartTrade Africa" />

    <!-- Open Graph (social previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="SmartTrade Africa" />
    <meta property="og:title"       content="SmartTrade Africa — Secure Online Shopping" />
    <meta property="og:description" content="Shop smarter and safer with biometric login, 256-bit encryption, and instant Flutterwave checkout." />
    <meta property="og:url"         content="https://smarttrade.africa" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="SmartTrade Africa" />
    <meta name="twitter:description" content="Secure, fast e-commerce for Africa." />

    <!-- Theme + app meta -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="SmartTrade" />

    <!-- Favicon — inline SVG, no extra network request -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Canonical + sitemap discovery -->
    <link rel="canonical" href="https://smarttrade.africa" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <title>SmartTrade Africa</title>
  </head>
  <body>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:2rem;text-align:center;">
        <div>
          <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.75rem;">JavaScript Required</h1>
          <p style="color:#6b7280;">Please enable JavaScript in your browser to use SmartTrade Africa.</p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
